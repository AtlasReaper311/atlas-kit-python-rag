name: CI
on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type-check (mypy)
        run: mypy src/
      - name: Test
        env:
          LLM_PROVIDER: ollama
          EMBEDDING_PROVIDER: local
          CHROMA_HOST: localhost
          CHROMA_PORT: "8000"
        run: pytest tests/ -v --tb=short --cov=atlas_rag --cov-report=term-missing --cov-report=json
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: python scripts/update_coverage_badge.py
      - name: Commit badge update
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No coverage change, skipping commit"
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Report to Discord
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="CI passed: atlas-kit-python-rag"; COLOR=4906624; STATUS="🟢 passed"
          else
            TITLE="CI failed: atlas-kit-python-rag"; COLOR=14830410; STATUS="🔴 failed"
          fi
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" --argjson color "$COLOR" --arg status "$STATUS" \
            --arg sha "$SHORT_SHA" --arg run_url "$RUN_URL" --arg actor "$ACTOR" \
            '{
              username: "ci-cd",
              embeds: [{
                title: $title, color: $color,
                fields: [
                  {name: "Status", value: $status, inline: true},
                  {name: "Commit", value: $sha, inline: true},
                  {name: "Actor", value: $actor, inline: true},
                  {name: "Run", value: ("[logs](" + $run_url + ")"), inline: false}
                ],
                footer: {text: "Atlas Systems — Pipeline"}
              }]
            }')
          curl -fsS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - name: Build production image
        run: docker build --target prod --tag atlas-rag:ci .
