name: CI
on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type-check (mypy)
        run: mypy src/
      - name: Test
        env:
          LLM_PROVIDER: ollama
          EMBEDDING_PROVIDER: local
          CHROMA_HOST: localhost
          CHROMA_PORT: "8000"
        run: pytest tests/ -v --tb=short --cov=atlas_rag --cov-report=term-missing --cov-report=json
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: python scripts/update_coverage_badge.py
      - name: Commit badge update
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No coverage change, skipping commit"
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
