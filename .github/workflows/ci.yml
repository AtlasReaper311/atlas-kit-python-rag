name: CI
on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type-check (mypy)
        run: mypy src/
      - name: Test
        env:
          LLM_PROVIDER: ollama
          EMBEDDING_PROVIDER: local
          CHROMA_HOST: localhost
          CHROMA_PORT: "8000"
        run: pytest tests/ -v --tb=short --cov=atlas_rag --cov-report=term-missing --cov-report=json
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: python scripts/update_coverage_badge.py
      - name: Commit badge update
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No coverage change, skipping commit"
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - name: Build production image
        run: docker build --target prod --tag atlas-rag:ci .

  # CI result reported through the reusable atlas-notify workflow:
  # routes to #ci-cd via signal_class, failures mirror to #alerts.
  notify:
    needs: quality
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.quality.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
