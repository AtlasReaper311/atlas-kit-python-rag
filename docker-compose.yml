services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index

  api:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - chroma

volumes:
  chroma_data:
