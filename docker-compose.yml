services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    volumes:
      - ./src:/app/src   # Hot-reload in dev
    depends_on:
      chroma:
        condition: service_healthy

volumes:
  chroma_data:
